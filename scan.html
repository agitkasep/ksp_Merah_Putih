<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QRIS - KOPDESKEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; }
        #reader { width: 100% !important; border: none !important; }
        #reader__dashboard { display: none !important; }
        /* Garis Laser Animasi */
        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: #22c55e;
            box-shadow: 0 0 15px #22c55e;
            animation: moveLine 2s infinite linear;
            z-index: 10;
        }
        @keyframes moveLine {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="flex flex-col h-screen text-white">

    <div class="p-6 flex items-center justify-between bg-indigo-950 shadow-2xl">
        <i onclick="window.location.href='anggota.html'" class="fa fa-arrow-left text-xl cursor-pointer"></i>
        <span class="font-black italic uppercase text-xs tracking-widest">Pemindai KOPDESKEL</span>
        <div class="w-6"></div>
    </div>

    <div class="flex-1 relative flex items-center justify-center overflow-hidden">
        <div id="reader" class="w-full h-full"></div>
        <div class="scan-line"></div>
    </div>

    <div class="p-10 bg-indigo-950 text-center rounded-t-[40px] -mt-10 z-20">
        <p class="text-[10px] font-black uppercase text-white/50 mb-4 tracking-widest">Fungsi Pintar QRIS :</p>
        <div class="flex justify-around items-center">
            <div class="flex flex-col items-center gap-2">
                <i class="fa fa-cart-shopping text-blue-400"></i>
                <span class="text-[7px] font-bold">BAYAR</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <i class="fa fa-paper-plane text-emerald-400"></i>
                <span class="text-[7px] font-bold">TRANSFER</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <i class="fa fa-user-check text-yellow-400"></i>
                <span class="text-[7px] font-bold">ABSEN</span>
            </div>
        </div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 250, height: 250 } };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                // LOGIKA DETEKSI OTOMATIS
                if (decodedText.includes("TOKOKOP-")) {
                    alert("🛒 MENU BAYAR\nID Toko: " + decodedText.split("-")[1]);
                } else if (decodedText.includes("ANGGOTA-")) {
                    alert("💸 MENU TRANSFER\nKe: " + decodedText.split("-")[1]);
                } else {
                    alert("✅ DATA TERDETEKSI\n" + decodedText);
                }
                // Jika ingin kembali setelah scan:
                // window.location.href = 'anggota.html';
            }
        ).catch(err => {
            console.error("Gagal Akses Kamera", err);
            alert("Aktifkan Izin Kamera di Pengaturan Browser Bapak");
        });
    </script>
</body>
</html>
