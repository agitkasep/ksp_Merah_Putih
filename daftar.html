<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - KSP Merah Putih</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { background:#f1f5f9; font-family:sans-serif; }
        .container { max-width:480px; margin:auto; background:white; min-height:100vh; padding:20px; }
        
        .camera-box {
            width:100%;
            height:240px;
            background:#000;
            border-radius:16px;
            overflow:hidden;
            position:relative;
            border: 2px solid #e2e8f0;
        }

        video { width:100%; height:100%; object-fit:cover; }

        .overlay-guide {
            position:absolute;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            border:2px dashed rgba(255,255,255,0.5);
            margin: 20px;
            border-radius:12px;
            pointer-events: none;
            color: white;
            font-size: 0.8rem;
        }

        .preview {
            width:100%;
            border-radius:12px;
            margin-top:10px;
            border: 2px solid #4f46e5;
        }
    </style>
</head>

<body>

<div class="container space-y-5">
    <h1 class="text-2xl font-bold text-center text-indigo-700">Pendaftaran Anggota</h1>
    <p class="text-center text-gray-500 -mt-4 text-sm">KSP Merah Putih</p>

    <div class="space-y-3">
        <input type="text" id="nama" placeholder="Nama lengkap sesuai KTP" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
        <input type="email" id="email" placeholder="Alamat Email" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">

        <div class="relative">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-xl pr-12 focus:ring-2 focus:ring-indigo-400 outline-none">
            <div id="togglePass" class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400">
                <i class="fas fa-eye"></i>
            </div>
        </div>
    </div>

    <hr>

    <div>
        <p class="font-bold mb-2"><i class="fa-solid fa-address-card mr-2"></i>Foto KTP</p>
        <div class="camera-box">
            <video id="videoKTP" autoplay playsinline muted></video>
            <div class="overlay-guide">Posisikan KTP di sini</div>
        </div>
        <button onclick="capture('ktp')" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-semibold transition">
            <i class="fa-solid fa-camera mr-2"></i>Ambil Foto KTP
        </button>
        <img id="previewKTP" class="preview hidden">
    </div>

    <div>
        <p class="font-bold mb-2"><i class="fa-solid fa-user-check mr-2"></i>Verifikasi Wajah</p>
        <div class="camera-box">
            <video id="videoFace" autoplay playsinline muted></video>
            <div class="overlay-guide" style="border-radius: 50%; aspect-ratio: 1/1; width: 180px; margin: auto;"></div>
        </div>
        <button onclick="capture('face')" class="w-full mt-2 bg-emerald-600 hover:bg-emerald-700 text-white p-3 rounded-xl font-semibold transition">
            <i class="fa-solid fa-face-smile mr-2"></i>Ambil Selfie
        </button>
        <img id="previewFace" class="preview hidden">
    </div>

    <div class="pt-4">
        <button onclick="submitData()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-2xl font-bold text-lg shadow-lg transition">
            Daftar Sekarang
        </button>
    </div>
</div>

<script>
let ktpData = null;
let faceData = null;

// START CAMERA (Satu stream untuk semua video)
async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" } 
        });
        
        document.getElementById('videoKTP').srcObject = stream;
        document.getElementById('videoFace').srcObject = stream;
    } catch (err) {
        console.error("Error akses kamera: ", err);
        alert("Gagal mengakses kamera. Pastikan izin diberikan.");
    }
}

// Jalankan kamera saat load
window.onload = startCamera;

// CAPTURE FOTO
function capture(type) {
    const video = document.getElementById(type === 'ktp' ? 'videoKTP' : 'videoFace');
    const canvas = document.createElement('canvas');
    
    // Set resolusi canvas sesuai video
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    const imgBase64 = canvas.toDataURL('image/jpeg', 0.8);

    if(type === 'ktp') {
        ktpData = imgBase64;
        const preview = document.getElementById('previewKTP');
        preview.src = imgBase64;
        preview.classList.remove('hidden');
    } else {
        faceData = imgBase64;
        const preview = document.getElementById('previewFace');
        preview.src = imgBase64;
        preview.classList.remove('hidden');
    }
    
    // Efek feedback visual sederhana
    video.style.opacity = "0.5";
    setTimeout(() => video.style.opacity = "1", 100);
}

// PASSWORD TOGGLE
document.getElementById('togglePass').addEventListener('click', function() {
    const input = document.getElementById('password');
    const icon = this.querySelector('i');

    if(input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
});

// SUBMIT DATA
function submitData() {
    const nama = document.getElementById('nama').value;
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;

    // Validasi Sederhana
    if (!nama || !email || !pass) {
        return alert("Mohon lengkapi nama, email, dan password!");
    }
    
    if (!ktpData || !faceData) {
        return alert("Mohon ambil foto KTP dan Wajah terlebih dahulu!");
    }

    // Simulasi Pengiriman
    console.log("Data siap dikirim:", {
        nama,
        email,
        password: pass,
        foto_ktp: ktpData.substring(0, 50) + "...", // Dipotong agar console tidak penuh
        foto_wajah: faceData.substring(0, 50) + "..."
    });

    alert("Pendaftaran berhasil! Data sedang diproses oleh sistem KSP Merah Putih.");
}
</script>

</body>
</html>
