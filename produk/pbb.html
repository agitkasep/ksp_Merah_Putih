<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pembayaran PBB - KOPDESKEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; display: flex; justify-content: center; min-height: 100vh; font-family: sans-serif; margin: 0; }
        .app-container { width: 100%; max-width: 480px; background-color: #ffffff; position: relative; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.1); overflow-x: hidden; }
        
        /* 1. Efek Tombol Fisik (Ditekan) */
        .hover-press { transition: all 0.15s ease; box-shadow: 0 6px 0 #3730a3; transform: translateY(-4px); }
        .hover-press:active, .hover-press:hover { transform: translateY(2px); box-shadow: 0 0px 0 #3730a3; }

        /* 2. Efek Sapuan Warna dari Kiri */
        .hover-sweep { position: relative; overflow: hidden; transition: color 0.4s ease; z-index: 1; }
        .hover-sweep::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: #4f46e5; /* Warna sapuan */
            transition: left 0.4s ease; z-index: -1;
        }
        .hover-sweep:hover::before { left: 0; }
        .hover-sweep:hover { color: white !important; }

        /* 3. Garis Bawah Meluncur */
        .hover-underline { position: relative; display: inline-block; padding-bottom: 2px; }
        .hover-underline::after {
            content: ''; position: absolute; width: 0; height: 2px; display: block;
            margin-top: 2px; right: 0; background: #4f46e5; transition: width 0.3s ease;
        }
        .hover-underline:hover::after { width: 100%; left: 0; background: #4f46e5; }

        /* 4. Efek Goyang Lonceng (Tilt) */
        @keyframes goyang {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            50% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
            100% { transform: rotate(0deg); }
        }
        .hover-tilt { transition: all 0.3s ease; display: inline-block; }
        .hover-tilt:hover { animation: goyang 0.4s ease-in-out; color: #ea580c; }

        /* Custom Input Focus */
        input:focus, select:focus { border-color: #4f46e5 !important; background: white !important; outline: none; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="bg-indigo-900 p-5 flex items-center text-white sticky top-0 z-50 rounded-b-[30px] shadow-lg relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            
            <i onclick="window.history.back()" class="fa fa-arrow-left text-lg cursor-pointer hover:scale-110 transition-transform p-2"></i>
            <h1 class="flex-1 text-center font-black italic uppercase tracking-widest text-[12px] mr-6">BAYAR PBB</h1>
        </div>

        <div class="flex-1 p-6 overflow-y-auto">
            
            <div class="bg-blue-50 border border-blue-100 rounded-3xl p-5 mb-8 flex items-center gap-4 shadow-sm">
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-blue-600 shadow-md flex-shrink-0">
                    <i class="fa fa-building-columns text-2xl hover-tilt cursor-pointer"></i>
                </div>
                <div>
                    <h2 class="text-[11px] font-black text-blue-900 uppercase italic">Pajak Bumi Bangunan</h2>
                    <p class="text-[9px] font-bold text-blue-600 mt-1 uppercase tracking-wider">Bayar pajak lebih mudah & cepat</p>
                </div>
            </div>

            <div class="space-y-6">
                
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Nomor Objek Pajak (NOP)</label>
                    <div class="relative">
                        <i class="fa fa-barcode absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-lg"></i>
                        <input type="number" id="nop" placeholder="Contoh: 32.73.010.001.011-0010.0" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 pl-12 pr-4 text-[11px] font-bold text-slate-700 transition-all shadow-inner">
                    </div>
                </div>

                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Tahun Pajak</label>
                    <div class="relative">
                        <i class="fa fa-calendar-days absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-lg"></i>
                        <select id="tahun" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 pl-12 pr-4 text-[11px] font-bold text-slate-700 transition-all shadow-inner appearance-none cursor-pointer">
                            <option value="" disabled selected>Pilih Tahun Tagihan</option>
                            <option value="2026">2026</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                        </select>
                        <i class="fa fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"></i>
                    </div>
                </div>

                <div class="bg-orange-50 border border-orange-100 p-4 rounded-2xl flex items-start gap-3 mt-4">
                    <i class="fa fa-bell text-orange-500 mt-0.5 hover-tilt cursor-pointer text-lg"></i>
                    <div>
                        <p class="text-[9px] font-black text-orange-800 uppercase">Perhatian!</p>
                        <p class="text-[8px] font-bold text-orange-600 mt-1 leading-relaxed">Pastikan NOP (18 Digit) yang Anda masukkan sudah benar. Keterlambatan pembayaran dapat dikenakan denda oleh pemerintah daerah.</p>
                    </div>
                </div>

            </div>

            <button onclick="cekTagihan()" class="w-full mt-8 py-5 bg-indigo-600 text-white rounded-[20px] text-[12px] font-black italic uppercase tracking-widest hover-press hover-sweep overflow-hidden border border-indigo-700">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <i class="fa fa-magnifying-glass"></i> Cek Tagihan PBB
                </span>
            </button>

            <div class="text-center mt-8">
                <span onclick="alert('Fitur riwayat sedang dikembangkan!')" class="hover-underline text-[9px] font-black text-indigo-500 uppercase cursor-pointer tracking-widest transition-colors">
                    Lihat Riwayat Pembayaran <i class="fa fa-arrow-right ml-1 text-[8px]"></i>
                </span>
            </div>

        </div>

    </div>

    <script>
        function cekTagihan() {
            const nop = document.getElementById('nop').value;
            const tahun = document.getElementById('tahun').value;

            if (!nop || !tahun) {
                alert("Waduh Pak, tolong lengkapi NOP dan Tahun Pajak dulu ya!");
                return;
            }

            if (nop.length < 18) {
                alert("NOP sepertinya kurang lengkap. Pastikan 18 digit angka ya Pak.");
                return;
            }

            // Simulasi Loading
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="relative z-10"><i class="fa fa-spinner fa-spin"></i> MENCARI DATA...</span>`;
            
            setTimeout(() => {
                alert(`✅ Data Ditemukan!\n\nNOP: ${nop}\nTahun: ${tahun}\nTagihan: Rp 150.000\n\n(Ini adalah simulasi cek tagihan PBB)`);
                btn.innerHTML = originalText;
            }, 1500);
        }
    </script>
</body>
</html>
