<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Layanan BPJS - KOPDESKEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; display: flex; justify-content: center; min-height: 100vh; font-family: sans-serif; margin: 0; }
        .app-container { width: 100%; max-width: 480px; background-color: #ffffff; position: relative; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.1); overflow-x: hidden; }
        
        /* =========================================
           EFEK TERBARU UNTUK HALAMAN BPJS
           ========================================= */
        
        /* 1. Efek Input Menyala (Focus Glow) */
        .input-glow { transition: all 0.3s ease; border: 2px solid #f1f5f9; }
        .input-glow:focus-within { 
            border-color: #10b981; /* Emerald Green BPJS */
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15); 
            transform: translateY(-2px);
        }

        /* 2. Efek Riak Air (Ripple) untuk Tombol Utama */
        .btn-ripple { position: relative; overflow: hidden; transition: transform 0.1s ease; }
        .btn-ripple:active { transform: scale(0.96); }
        .btn-ripple::after {
            content: ""; display: block; position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0; transition: transform .5s, opacity 1s;
        }
        .btn-ripple:active::after { transform: scale(0, 0); opacity: 0.3; transition: 0s; }

        /* 3. Animasi Transisi Tab (Fade & Slide) */
        .tab-content { display: none; animation: fadeSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .tab-content.active { display: block; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 4. Efek Kartu Terangkat */
        .hover-lift { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2); }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="bg-white p-5 flex items-center border-b sticky top-0 z-50">
            <i onclick="window.history.back()" class="fa fa-arrow-left text-emerald-600 text-lg cursor-pointer p-2 btn-ripple rounded-full"></i>
            <h1 class="flex-1 text-center font-black italic uppercase tracking-widest text-[11px] text-slate-800 mr-8">LAYANAN BPJS</h1>
        </div>

        <div class="pt-6 pb-2 px-6 flex flex-col items-center">
            <div class="w-32 h-10 mb-4 hover-lift cursor-pointer">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/BPJS_Kesehatan_logo.svg/512px-BPJS_Kesehatan_logo.svg.png" alt="BPJS Kesehatan" class="w-full h-full object-contain">
            </div>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest text-center">Badan Penyelenggara Jaminan Sosial</p>
        </div>

        <div class="px-6 mt-4">
            <div class="bg-slate-100 p-1.5 rounded-2xl flex relative shadow-inner">
                <button onclick="switchTab('bayar')" id="btn-bayar" class="flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-white bg-emerald-600 shadow-md">
                    <i class="fa fa-file-invoice-dollar mr-1"></i> Bayar Tagihan
                </button>
                <button onclick="switchTab('daftar')" id="btn-daftar" class="flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-slate-500 hover:text-emerald-600">
                    <i class="fa fa-user-plus mr-1"></i> Daftar Baru
                </button>
            </div>
        </div>

        <div class="flex-1 p-6 overflow-y-auto">
            
            <div id="tab-bayar" class="tab-content active space-y-5">
                
                <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-2xl flex items-start gap-3 mb-2 hover-lift">
                    <i class="fa fa-shield-heart text-emerald-500 mt-0.5 text-lg"></i>
                    <div>
                        <p class="text-[9px] font-black text-emerald-900 uppercase">Bayar BPJS Kesehatan</p>
                        <p class="text-[8px] font-bold text-emerald-700 mt-1 leading-relaxed">Masukkan Nomor Virtual Account (VA) Keluarga Anda (11-16 Digit).</p>
                    </div>
                </div>

                <div class="input-glow bg-white rounded-2xl p-2 shadow-sm">
                    <label class="text-[8px] font-black text-slate-400 uppercase ml-2 block pt-1">Nomor VA BPJS</label>
                    <div class="flex items-center px-2 pb-1">
                        <i class="fa fa-hashtag text-slate-300 mr-2"></i>
                        <input type="number" id="va-bpjs" placeholder="00000 123456789" class="w-full bg-transparent py-2 text-sm font-black text-slate-700 outline-none tracking-widest">
                    </div>
                </div>

                <div class="input-glow bg-white rounded-2xl p-2 shadow-sm">
                    <label class="text-[8px] font-black text-slate-400 uppercase ml-2 block pt-1">Bayar Hingga Bulan</label>
                    <div class="flex items-center px-2 pb-1">
                        <i class="fa fa-calendar-check text-slate-300 mr-2"></i>
                        <select id="bulan-bpjs" class="w-full bg-transparent py-2 text-xs font-bold text-slate-700 outline-none appearance-none cursor-pointer">
                            <option value="1">1 Bulan</option>
                            <option value="2">2 Bulan</option>
                            <option value="3">3 Bulan</option>
                            <option value="6">6 Bulan</option>
                            <option value="12">1 Tahun Penuh</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="tab-daftar" class="tab-content space-y-4">
                
                <div class="bg-blue-50 border border-blue-100 p-4 rounded-2xl flex items-start gap-3 mb-2 hover-lift">
                    <i class="fa fa-id-card text-blue-500 mt-0.5 text-lg"></i>
                    <div>
                        <p class="text-[9px] font-black text-blue-900 uppercase">Pendaftaran Anggota Baru</p>
                        <p class="text-[8px] font-bold text-blue-700 mt-1 leading-relaxed">Pendaftaran kolektif melalui KOPDESKEL. Pastikan NIK KTP sesuai.</p>
                    </div>
                </div>

                <div class="input-glow bg-white rounded-2xl p-2 shadow-sm">
                    <label class="text-[8px] font-black text-slate-400 uppercase ml-2 block pt-1">NIK (Sesuai KTP)</label>
                    <div class="flex items-center px-2 pb-1">
                        <input type="number" id="nik-daftar" placeholder="32xxxxxxxxxxxxxx" class="w-full bg-transparent py-2 text-xs font-bold text-slate-700 outline-none tracking-widest">
                    </div>
                </div>

                <div class="input-glow bg-white rounded-2xl p-2 shadow-sm">
                    <label class="text-[8px] font-black text-slate-400 uppercase ml-2 block pt-1">Nama Lengkap</label>
                    <div class="flex items-center px-2 pb-1">
                        <input type="text" id="nama-daftar" placeholder="AGIT PAMUNGKAS" class="w-full bg-transparent py-2 text-xs font-bold text-slate-700 outline-none uppercase">
                    </div>
                </div>

                <div class="input-glow bg-white rounded-2xl p-2 shadow-sm">
                    <label class="text-[8px] font-black text-slate-400 uppercase ml-2 block pt-1">Pilih Kelas Perawatan</label>
                    <div class="flex items-center px-2 pb-1">
                        <select id="kelas-daftar" class="w-full bg-transparent py-2 text-xs font-bold text-slate-700 outline-none cursor-pointer appearance-none">
                            <option value="" disabled selected>-- Pilih Kelas --</option>
                            <option value="3">Kelas 3 (Rp 35.000/bln)</option>
                            <option value="2">Kelas 2 (Rp 100.000/bln)</option>
                            <option value="1">Kelas 1 (Rp 150.000/bln)</option>
                        </select>
                    </div>
                </div>

                <div class="input-glow bg-white rounded-2xl p-2 shadow-sm">
                    <label class="text-[8px] font-black text-slate-400 uppercase ml-2 block pt-1">Faskes Tingkat 1</label>
                    <div class="flex items-center px-2 pb-1">
                        <input type="text" id="faskes-daftar" placeholder="Contoh: Puskesmas Desa..." class="w-full bg-transparent py-2 text-xs font-bold text-slate-700 outline-none capitalize">
                    </div>
                </div>
            </div>

        </div>

        <div class="p-6 bg-white border-t rounded-t-[30px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <button onclick="prosesAksi()" class="w-full py-5 bg-emerald-600 text-white rounded-[20px] text-[12px] font-black uppercase italic tracking-widest btn-ripple shadow-xl shadow-emerald-200">
                <span id="btn-text-main">CEK TAGIHAN BPJS</span> <i class="fa fa-arrow-right ml-2"></i>
            </button>
        </div>

    </div>

    <script>
        let currentMode = 'bayar'; // Mode default

        // Fungsi Ganti Tab
        function switchTab(mode) {
            currentMode = mode;
            
            const btnBayar = document.getElementById('btn-bayar');
            const btnDaftar = document.getElementById('btn-daftar');
            const tabBayar = document.getElementById('tab-bayar');
            const tabDaftar = document.getElementById('tab-daftar');
            const btnMainText = document.getElementById('btn-text-main');

            if (mode === 'bayar') {
                // Style Tombol Aktif
                btnBayar.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-white bg-emerald-600 shadow-md";
                btnDaftar.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-slate-500 hover:text-emerald-600";
                
                // Ganti Konten
                tabBayar.classList.add('active');
                tabDaftar.classList.remove('active');
                
                // Ubah Teks Tombol Bawah
                btnMainText.innerText = "CEK TAGIHAN BPJS";
            } else {
                // Style Tombol Aktif
                btnDaftar.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-white bg-blue-600 shadow-md";
                btnBayar.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-slate-500 hover:text-emerald-600";
                
                // Ganti Konten
                tabDaftar.classList.add('active');
                tabBayar.classList.remove('active');
                
                // Ubah Teks Tombol Bawah & Warnanya
                btnMainText.innerText = "KIRIM DATA PENDAFTARAN";
                document.querySelector('.btn-ripple').classList.replace('bg-emerald-600', 'bg-blue-600');
                document.querySelector('.btn-ripple').classList.replace('shadow-emerald-200', 'shadow-blue-200');
            }

            // Kembalikan warna tombol utama kalau balik ke bayar
            if(mode === 'bayar') {
                document.querySelector('.btn-ripple').classList.replace('bg-blue-600', 'bg-emerald-600');
                document.querySelector('.btn-ripple').classList.replace('shadow-blue-200', 'shadow-emerald-200');
            }
        }

        // Fungsi Eksekusi
        function prosesAksi() {
            if (currentMode === 'bayar') {
                const va = document.getElementById('va-bpjs').value;
                if (!va) {
                    alert("Mohon masukkan Nomor VA BPJS terlebih dahulu!");
                    return;
                }
                alert(`Memeriksa tagihan BPJS untuk Nomor VA: ${va}...`);
            } else {
                const nik = document.getElementById('nik-daftar').value;
                const nama = document.getElementById('nama-daftar').value;
                const kelas = document.getElementById('kelas-daftar').value;
                
                if (!nik || !nama || !kelas) {
                    alert("Tolong lengkapi NIK, Nama, dan Kelas perawatan untuk pendaftaran baru!");
                    return;
                }
                alert(`Terima kasih ${nama.toUpperCase()}! Data pendaftaran BPJS Anda sedang diproses oleh admin KOPDESKEL.`);
            }
        }
    </script>
</body>
</html>
