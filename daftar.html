<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - KSP Merah Putih</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        body { background:#f1f5f9; font-family:sans-serif; }
        .container { max-width:500px; margin:auto; background:white; min-height:100vh; padding:20px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .camera-box { width:100%; height:280px; background:#000; border-radius:16px; overflow:hidden; position:relative; display:none; }
        video { width:100%; height:100%; object-fit:cover; }
        .preview-img { width:100%; border-radius:12px; margin-top:10px; border: 2px solid #4f46e5; }
        .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999; color:white; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white mb-4"></div>
    <p id="loader-text">Memproses data...</p>
</div>

<div class="container space-y-4">
    <h1 class="text-2xl font-bold text-center text-indigo-700">Berkas_Anggota</h1>
    
    <div class="space-y-3">
        <label class="block text-sm font-semibold">Data Pribadi</label>
        <input type="text" id="nama" placeholder="Nama Lengkap (Sesuai KTP)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
        <div class="grid grid-cols-2 gap-2">
            <input type="text" id="username" placeholder="Username" class="p-3 border rounded-xl">
            <div class="relative">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-xl pr-10">
                <i id="togglePass" class="fas fa-eye absolute right-3 top-4 cursor-pointer text-gray-400"></i>
            </div>
        </div>
        <input type="text" id="ttl" placeholder="Tempat, Tanggal Lahir" class="w-full p-3 border rounded-xl">
        <textarea id="alamat" placeholder="Alamat Lengkap (Sesuai KTP)" class="w-full p-3 border rounded-xl"></textarea>
        <input type="text" id="ibu" placeholder="Nama Ibu Kandung" class="w-full p-3 border rounded-xl">
        
        <div class="grid grid-cols-2 gap-2">
            <select id="agama" class="p-3 border rounded-xl">
                <option value="">Pilih Agama</option>
                <option>Islam</option><option>Kristen</option><option>Katolik</option><option>Hindu</option><option>Buddha</option><option>Khonghucu</option>
            </select>
            <select id="gender" class="p-3 border rounded-xl">
                <option value="">Jenis Kelamin</option>
                <option value="L">Laki-laki</option>
                <option value="P">Perempuan</option>
            </select>
        </div>
        <input type="text" id="pekerjaan" placeholder="Pekerjaan" class="w-full p-3 border rounded-xl">
    </div>

    <hr class="my-4">

    <div class="space-y-2">
        <p class="font-bold text-gray-700"><i class="fa-solid fa-id-card mr-2"></i>Verifikasi KTP</p>
        <button id="btnPrepareKTP" onclick="initCamera('ktp', 'environment')" class="w-full bg-blue-100 text-blue-700 p-3 rounded-xl font-semibold border-2 border-blue-200">
            1. Siapkan KTP
        </button>
        <div id="boxKTP" class="camera-box">
            <video id="videoKTP" autoplay playsinline></video>
            <button onclick="takeSnapshot('ktp')" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-2 rounded-full font-bold shadow-lg">
                <i class="fa-solid fa-circle-dot mr-2"></i>Ambil Foto KTP
            </button>
        </div>
        <img id="resKTP" class="preview-img hidden">
        <input type="hidden" id="nik_hidden"> </div>

    <div class="space-y-2">
        <p class="font-bold text-gray-700"><i class="fa-solid fa-face-smile mr-2"></i>Verifikasi Wajah</p>
        <button id="btnPrepareSelfie" onclick="initCamera('face', 'user')" class="w-full bg-emerald-100 text-emerald-700 p-3 rounded-xl font-semibold border-2 border-emerald-200">
            2. Foto Selfie
        </button>
        <div id="boxFace" class="camera-box">
            <video id="videoFace" autoplay playsinline></video>
            <button onclick="takeSnapshot('face')" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-2 rounded-full font-bold shadow-lg">
                <i class="fa-solid fa-camera mr-2"></i>Ambil Selfie
            </button>
        </div>
        <img id="resFace" class="preview-img hidden">
    </div>

    <button onclick="submitAllData()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold text-lg mt-6 shadow-indigo-200 shadow-xl">
        SIMPAN DATA KE DATABASE
    </button>
</div>

<script>
// --- KONFIGURASI SUPABASE ---
const supabaseUrl = 'YOUR_SUPABASE_URL';
const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

let currentStream = null;
let ktpBase64 = null;
let faceBase64 = null;

// 1. FUNGSI AKTIFKAN KAMERA (Berdasarkan Perintah)
async function initCamera(type, mode) {
    // Matikan stream sebelumnya jika ada
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    const box = type === 'ktp' ? document.getElementById('boxKTP') : document.getElementById('boxFace');
    const video = type === 'ktp' ? document.getElementById('videoKTP') : document.getElementById('videoFace');
    const btn = type === 'ktp' ? document.getElementById('btnPrepareKTP') : document.getElementById('btnPrepareSelfie');

    try {
        currentStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: mode } 
        });
        video.srcObject = currentStream;
        box.style.display = 'block';
        btn.classList.add('hidden'); // Sembunyikan tombol "Siapkan"
    } catch (err) {
        alert("Gagal akses kamera: " + err);
    }
}

// 2. FUNGSI AMBIL FOTO
async function takeSnapshot(type) {
    const video = document.getElementById(type === 'ktp' ? 'videoKTP' : 'videoFace');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

    if(type === 'ktp') {
        ktpBase64 = dataUrl;
        document.getElementById('resKTP').src = dataUrl;
        document.getElementById('resKTP').classList.remove('hidden');
        document.getElementById('boxKTP').style.display = 'none';
        extractNIK(dataUrl); // Jalankan OCR Tersembunyi
    } else {
        faceBase64 = dataUrl;
        document.getElementById('resFace').src = dataUrl;
        document.getElementById('resFace').classList.remove('hidden');
        document.getElementById('boxFace').style.display = 'none';
    }

    // Matikan kamera setelah ambil foto
    currentStream.getTracks().forEach(track => track.stop());
}

// 3. FUNGSI OCR TERSEMBUNYI (Ambil NIK)
async function extractNIK(image) {
    console.log("Memulai ekstraksi NIK...");
    Tesseract.recognize(image, 'ind').then(({ data: { text } }) => {
        // Regex mencari 16 digit angka (format NIK)
        const match = text.match(/\d{16}/);
        if (match) {
            document.getElementById('nik_hidden').value = match[0];
            console.log("NIK Terdeteksi: " + match[0]);
        }
    });
}

// 4. SUBMIT KE SUPABASE
async function submitAllData() {
    const loader = document.getElementById('loader');
    const data = {
        nama_lengkap: document.getElementById('nama').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        ttl: document.getElementById('ttl').value,
        alamat: document.getElementById('alamat').value,
        ibu_kandung: document.getElementById('ibu').value,
        agama: document.getElementById('agama').value,
        jenis_kelamin: document.getElementById('gender').value,
        pekerjaan: document.getElementById('pekerjaan').value,
        nik: document.getElementById('nik_hidden').value,
        foto_ktp: ktpBase64,
        foto_selfie: faceBase64,
        created_at: new Date()
    };

    if (!data.nama_lengkap || !ktpBase64 || !faceBase64) {
        return alert("Mohon lengkapi form dan foto!");
    }

    loader.style.display = 'flex';

    const { error } = await _supabase
        .from('Berkas_Anggota')
        .insert([data]);

    loader.style.display = 'none';

    if (error) {
        alert("Gagal simpan ke Supabase: " + error.message);
    } else {
        alert("Data Berhasil Tersimpan ke Database Berkas_Anggota!");
        location.reload();
    }
}

// Toggle Password
document.getElementById('togglePass').addEventListener('click', function() {
    const input = document.getElementById('password');
    if(input.type === 'password') {
        input.type = 'text';
        this.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        this.classList.replace('fa-eye-slash', 'fa-eye');
    }
});
</script>

</body>
</html>
