<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>E-Wallet KOPDESKEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; display: flex; justify-content: center; min-height: 100vh; font-family: sans-serif; margin: 0; }
        .app-container { width: 100%; max-width: 480px; background-color: #ffffff; position: relative; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.1); overflow-x: hidden; }
        
        /* EFEK KARTU SALDO (Glassmorphism) */
        .wallet-card {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.3);
        }
        .wallet-card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 100%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            transform: rotate(30deg);
        }

        /* EFEK PROVIDER SELECT */
        .provider-item {
            border: 2px solid #f1f5f9;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .provider-item.active {
            border-color: #2563eb;
            background-color: #eff6ff;
            transform: scale(1.05);
        }

        /* NOMINAL GRID */
        .nominal-btn {
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .nominal-btn:active { transform: scale(0.95); background-color: #f8fafc; }
        .nominal-btn.selected {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-active:active { transform: scale(0.96); opacity: 0.9; }
        
        /* ANIMASI */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="p-6 flex items-center justify-between">
            <i onclick="window.history.back()" class="fa fa-chevron-left text-slate-800 text-lg cursor-pointer btn-active"></i>
            <h1 class="text-sm font-black text-slate-800 uppercase tracking-widest italic">E-Wallet Center</h1>
            <i class="fa fa-circle-question text-slate-400 text-lg"></i>
        </div>

        <div class="px-6 flex-1 overflow-y-auto pb-24">
            
            <div class="wallet-card p-6 text-white mb-8 animate-up">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Total Saldo Terintegrasi</p>
                        <h2 class="text-2xl font-black mt-1">Rp 2.450.000</h2>
                    </div>
                    <i class="fa fa-wallet text-3xl opacity-30"></i>
                </div>
                <div class="flex justify-between items-center bg-white/10 p-3 rounded-xl backdrop-blur-md">
                    <span class="text-[9px] font-bold uppercase">ID Anggota: KOP-2026-AGIT</span>
                    <button class="bg-white text-blue-600 px-3 py-1 rounded-lg text-[8px] font-black uppercase">Riwayat</button>
                </div>
            </div>

            <div class="mb-6 animate-up" style="animation-delay: 0.1s">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Pilih Layanan E-Wallet</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div onclick="selectProvider(this, 'DANA')" class="provider-item p-4 rounded-2xl flex flex-col items-center justify-center gap-2">
                        <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white"><i class="fa fa-gem"></i></div>
                        <span class="text-[9px] font-black uppercase text-slate-600">DANA</span>
                    </div>
                    <div onclick="selectProvider(this, 'OVO')" class="provider-item p-4 rounded-2xl flex flex-col items-center justify-center gap-2">
                        <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-white"><i class="fa fa-circle"></i></div>
                        <span class="text-[9px] font-black uppercase text-slate-600">OVO</span>
                    </div>
                    <div onclick="selectProvider(this, 'GOPAY')" class="provider-item p-4 rounded-2xl flex flex-col items-center justify-center gap-2">
                        <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white"><i class="fa fa-motorcycle"></i></div>
                        <span class="text-[9px] font-black uppercase text-slate-600">GOPAY</span>
                    </div>
                </div>
            </div>

            <div class="mb-6 animate-up" style="animation-delay: 0.2s">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Nomor HP Terdaftar</h3>
                <div class="relative">
                    <i class="fa fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="number" id="phone" placeholder="08xx xxxx xxxx" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 pl-12 pr-4 text-xs font-black text-slate-700 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div class="animate-up" style="animation-delay: 0.3s">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Pilih Nominal Top Up</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selectNominal(this, 20000)" class="nominal-btn p-4 rounded-xl text-[11px] font-black italic">Rp 20.000</button>
                    <button onclick="selectNominal(this, 50000)" class="nominal-btn p-4 rounded-xl text-[11px] font-black italic">Rp 50.000</button>
                    <button onclick="selectNominal(this, 100000)" class="nominal-btn p-4 rounded-xl text-[11px] font-black italic">Rp 100.000</button>
                    <button onclick="selectNominal(this, 200000)" class="nominal-btn p-4 rounded-xl text-[11px] font-black italic">Rp 200.000</button>
                </div>
            </div>

        </div>

        <div class="fixed bottom-0 w-full max-w-[480px] bg-white border-t p-6 flex flex-col gap-3 rounded-t-[30px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-center px-2">
                <span class="text-[9px] font-black text-slate-400 uppercase">Total Bayar</span>
                <span id="display-total" class="text-base font-black text-blue-600">Rp 0</span>
            </div>
            <button onclick="prosesBayar()" class="w-full bg-blue-600 text-white py-4 rounded-2xl text-[11px] font-black uppercase italic tracking-widest btn-active shadow-lg shadow-blue-100">
                Konfirmasi Top Up <i class="fa fa-arrow-right ml-1"></i>
            </button>
        </div>

    </div>

    <script>
        let selectedProvider = "";
        let selectedPrice = 0;

        function selectProvider(element, name) {
            // Reset active state
            document.querySelectorAll('.provider-item').forEach(el => el.classList.remove('active'));
            // Set current active
            element.classList.add('active');
            selectedProvider = name;
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function selectNominal(element, price) {
            // Reset active state
            document.querySelectorAll('.nominal-btn').forEach(el => el.classList.remove('selected'));
            // Set current active
            element.classList.add('selected');
            selectedPrice = price;
            
            // Tambahkan biaya admin Rp 1.000
            const total = price + 1000;
            document.getElementById('display-total').innerText = 'Rp ' + total.toLocaleString('id-ID');
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function prosesBayar() {
            const phone = document.getElementById('phone').value;
            if(!selectedProvider || !phone || selectedPrice === 0) {
                alert("Mohon pilih E-Wallet, isi nomor HP, dan pilih nominal!");
                return;
            }
            alert(`Memproses Top Up ${selectedProvider} ke ${phone} sebesar Rp ${selectedPrice.toLocaleString('id-ID')}. \nSilakan tunggu notifikasi berhasil.`);
        }
    </script>
</body>
</html>
