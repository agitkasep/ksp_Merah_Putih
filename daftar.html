<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Anggota - KSP Merah Putih</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Styling untuk video kamera agar bulat dan rapi */
        #camera-stream, #photo-preview-ktp, #photo-preview-face {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden">

    <div class="p-8 bg-indigo-950 text-white rounded-b-[40px] shadow-2xl text-center relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
        <div class="relative z-10">
            <h1 class="font-black italic text-2xl tracking-tighter uppercase">KSP MERAH PUTIH</h1>
            <p class="text-[10px] font-bold opacity-70 tracking-[4px] uppercase mt-1">Digital Desa Mandiri</p>
        </div>
    </div>

    <div class="p-6 -mt-10 max-w-md mx-auto relative z-20">
        
        <div id="step-data" class="bg-white rounded-[35px] shadow-xl p-8 border border-slate-100">
            <h2 class="text-center font-black text-indigo-950 uppercase italic text-sm mb-8 tracking-widest">Data Diri</h2>
            <div class="mb-5">
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-2 ml-2">Nama Lengkap (Sesuai KTP) :</label>
                <input type="text" id="nama-lengkap" class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-4 px-5 text-sm font-bold text-indigo-950 uppercase" placeholder="AGIT PAMUNGKAS">
            </div>
            <div class="mb-8">
                <label class="text-[9px] font-black text-slate-400 uppercase block mb-2 ml-2">Nomor NIK KTP :</label>
                <input type="number" id="nik" class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-4 px-5 text-sm font-bold text-indigo-950" placeholder="16 DIGIT NOMOR KTP">
            </div>
            <button onclick="lanjutKeFoto()" class="w-full bg-indigo-950 text-white py-5 rounded-[25px] font-black italic shadow-2xl flex items-center justify-center gap-3">
                LANJUT KE FOTO VERIFIKASI
                <i class="fa fa-arrow-right"></i>
            </button>
        </div>

        <div id="step-photo" class="bg-white rounded-[35px] shadow-xl p-8 border border-slate-100 hidden">
            <h2 class="text-center font-black text-indigo-950 uppercase italic text-sm mb-6 tracking-widest">Verifikasi Wajah & KTP</h2>
            
            <div class="relative w-full aspect-video bg-slate-100 rounded-[25px] mb-6 border-4 border-dashed border-slate-200 overflow-hidden" id="camera-container">
                <video id="camera-stream" autoplay playsinline class="hidden"></video>
                <canvas id="photo-canvas" class="hidden"></canvas>
                
                <div id="ktp-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400">
                    <i class="fa fa-id-card text-5xl mb-3"></i>
                    <p class="text-[10px] font-bold uppercase">Foto KTP Anda</p>
                </div>
                <div id="face-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 hidden">
                    <i class="fa fa-user-circle text-5xl mb-3"></i>
                    <p class="text-[10px] font-bold uppercase">Foto Wajah Setengah Badan</p>
                </div>

                <img id="photo-preview-ktp" class="absolute inset-0 hidden">
                <img id="photo-preview-face" class="absolute inset-0 hidden">
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <button id="btn-ktp" onclick="ambilFoto('ktp')" class="bg-slate-100 text-indigo-950 py-4 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2">
                    <i class="fa fa-id-card"></i> AMBIL FOTO KTP
                </button>
                <button id="btn-face" onclick="ambilFoto('face')" disabled class="w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-bold opacity-50 flex items-center justify-center gap-3">
                    <i class="fa fa-camera"></i> AMBIL FOTO WAJAH
                </button>
            </div>

            <button id="btn-submit" onclick="prosesDaftarAkhir()" class="w-full bg-emerald-600 text-white py-5 rounded-[25px] font-black italic shadow-2xl flex items-center justify-center gap-3 opacity-50" disabled>
                <i class="fa fa-check-circle"></i> SELESAI & DAFTAR
            </button>
        </div>

    </div>

   <script>
        let ktpPhotoData = null;
        let facePhotoData = null;
        let currentStream = null;
        let modeKamera = "environment"; // Mulai dengan kamera belakang

        // 1. Fungsi Navigasi Halaman
        function lanjutKeFoto() {
            const nama = document.getElementById('nama-lengkap').value;
            const nik = document.getElementById('nik').value;

            if(!nama || nik.length < 16) {
                alert("Mohon isi Nama Lengkap dan NIK (16 digit) dengan benar!");
                return;
            }

            document.getElementById('step-data').classList.add('hidden');
            document.getElementById('step-photo').classList.remove('hidden');
            startCamera();
        }

        // 2. Fungsi Kamera Stabil (Cegah Layar Hitam)
        async function startCamera() {
            const video = document.getElementById('camera-stream');
            
            // Matikan total stream lama agar sensor lepas dari memori
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                currentStream = null;
            }

            // Jeda 500ms agar hardware HP tidak 'crash' saat ganti lensa
            await new Promise(resolve => setTimeout(resolve, 500));

            try {
                const constraints = {
                    video: { 
                        facingMode: modeKamera,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;

                // Paksa video render ke layar
                video.onloadedmetadata = () => {
                    video.play();
                };

                video.classList.remove('hidden');
            } catch (err) {
                console.error("Gagal kamera:", err);
                alert("Gagal mengakses kamera. Pastikan izin kamera sudah di-Allow!");
            }
        }

        // 3. Fungsi Ambil Foto & Logika Pindah Kamera Otomatis
        function ambilFoto(tipe) {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('photo-canvas');
            const context = canvas.getContext('2d');

            // Tangkap gambar sesuai resolusi video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const photoData = canvas.toDataURL('image/jpeg', 0.8);

            if (tipe === 'ktp') {
                ktpPhotoData = photoData;
                
                // Tampilkan hasil foto KTP
                document.getElementById('ktp-placeholder').classList.add('hidden');
                const previewKtp = document.getElementById('photo-preview-ktp');
                previewKtp.src = photoData;
                previewKtp.classList.remove('hidden');
                
                // Sembunyikan video sebentar biar transisi bersih
                video.classList.add('hidden');
                
                alert("Foto KTP Berhasil! Siapkan wajah Anda untuk verifikasi.");
                
                // PINDAH KE KAMERA DEPAN
                modeKamera = "user"; 
                
                // Aktifkan tombol foto wajah
                const btnFace = document.getElementById('btn-face');
                btnFace.classList.remove('opacity-50', 'bg-slate-100');
                btnFace.classList.add('bg-indigo-600', 'text-white');
                btnFace.disabled = false;

                // Nyalakan ulang kamera (Otomatis ganti ke depan)
                startCamera();
                
            } else if (tipe === 'face') {
                facePhotoData = photoData;
                
                // Tampilkan hasil foto wajah
                const previewFace = document.getElementById('photo-preview-face');
                previewFace.src = photoData;
                previewFace.classList.remove('hidden');
                document.getElementById('face-placeholder').classList.add('hidden');
                
                // Matikan kamera karena sudah selesai
                if(currentStream) currentStream.getTracks().forEach(track => track.stop());
                video.classList.add('hidden');

                // Aktifkan tombol SELESAI
                const btnSubmit = document.getElementById('btn-submit');
                btnSubmit.classList.remove('opacity-50');
                btnSubmit.disabled = false;
                
                alert("Verifikasi Wajah Berhasil! Silakan klik 'SELESAI & DAFTAR'.");
            }
        }

        // 4. Proses Simpan Akhir ke Database (LocalStorage)
        function prosesDaftarAkhir() {
            const nama = document.getElementById('nama-lengkap').value;
            const nik = document.getElementById('nik').value;

            // Simpan semua data anggota
            localStorage.setItem('namaLengkapAnggota', nama);
            localStorage.setItem('nikAnggota', nik);
            localStorage.setItem('fotoWajahAnggota', facePhotoData);

            alert("✅ PENDAFTARAN BERHASIL!\nSelamat bergabung di KSP Merah Putih, " + nama.toUpperCase() + ".");
            
            // Langsung lempar ke Dashboard Anggota
            window.location.href = 'anggota.html'; 
        }
    </script>
</body>
</html>
