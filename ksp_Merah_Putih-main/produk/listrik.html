<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Listrik PLN - KOPDESKEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; display: flex; justify-content: center; min-height: 100vh; font-family: sans-serif; margin: 0; }
        .app-container { width: 100%; max-width: 480px; background-color: #ffffff; position: relative; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.1); overflow-x: hidden; }
        
        /* =========================================
           EFEK TERBARU: ELECTRIC GLOW & BOLT
           ========================================= */
        
        /* 1. Efek Menyala Kuning pada Input (Saklar Nyala) */
        .electric-input { transition: all 0.3s ease; border: 2px solid #f1f5f9; }
        .electric-input:focus-within { 
            border-color: #eab308; /* Kuning PLN */
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); 
            background-color: #fefce8;
        }

        /* 2. Efek Kotak Nominal (Glow & Bounce) */
        .bolt-card {
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid #f1f5f9;
        }
        .bolt-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: #eab308;
            box-shadow: 0 10px 20px -5px rgba(234, 179, 8, 0.4);
            background-color: white;
            z-index: 10;
        }
        
        /* Ikon Petir Nyetrum */
        .bolt-icon { transition: transform 0.3s ease, color 0.3s ease; }
        .bolt-card:hover .bolt-icon { 
            transform: scale(1.3) rotate(15deg); 
            color: #eab308; 
        }

        /* 3. Transisi Tab (Sliding Switch) */
        .tab-content { display: none; animation: slideIn 0.3s ease forwards; }
        .tab-content.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .btn-active:active { transform: scale(0.95); }
        
        /* Gradient khusus tombol bayar */
        .bg-pln-grad { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); }
        .bg-pln-grad:active { background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="bg-white p-5 flex items-center border-b-4 border-yellow-400 sticky top-0 z-50 shadow-sm">
            <i onclick="window.history.back()" class="fa fa-arrow-left text-sky-600 text-lg cursor-pointer p-2 btn-active"></i>
            <h1 class="flex-1 text-center font-black italic uppercase tracking-widest text-[11px] text-sky-900 mr-8">LAYANAN PLN</h1>
        </div>

        <div class="pt-6 pb-2 px-6 flex flex-col items-center">
            <div class="w-20 h-24 mb-3 transition-transform hover:scale-110 cursor-pointer">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Logo_PLN.svg/512px-Logo_PLN.svg.png" alt="PLN" class="w-full h-full object-contain">
            </div>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest text-center">Perusahaan Listrik Negara</p>
        </div>

        <div class="px-6 mt-5">
            <div class="bg-slate-100 p-1.5 rounded-2xl flex relative shadow-inner">
                <button onclick="switchTab('token')" id="btn-token" class="flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-white bg-sky-600 shadow-md">
                    <i class="fa fa-bolt mr-1 text-yellow-300"></i> Token (Prabayar)
                </button>
                <button onclick="switchTab('tagihan')" id="btn-tagihan" class="flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-slate-500 hover:text-sky-600">
                    <i class="fa fa-file-invoice mr-1"></i> Tagihan (Pascabayar)
                </button>
            </div>
        </div>

        <div class="flex-1 p-6 overflow-y-auto">
            
            <div id="tab-token" class="tab-content active space-y-5">
                
                <div class="electric-input bg-white rounded-[20px] p-3 shadow-sm">
                    <label class="text-[8px] font-black text-slate-400 uppercase ml-2 block pt-1 tracking-widest">No. Meter / ID Pelanggan</label>
                    <div class="flex items-center px-2 pb-1 mt-1 relative">
                        <i class="fa fa-tachometer-alt text-slate-300 mr-3 text-lg"></i>
                        <input type="number" id="id-token" placeholder="11xxxxxxxxxx" class="w-full bg-transparent py-2 text-sm font-black text-slate-700 outline-none tracking-widest">
                        <button class="absolute right-0 top-1/2 -translate-y-1/2 bg-yellow-100 text-yellow-700 px-3 py-1.5 rounded-xl text-[8px] font-black uppercase tracking-tighter btn-active shadow-sm">Cek ID</button>
                    </div>
                </div>

                <h3 class="text-[10px] font-black text-sky-900 uppercase italic mt-6 mb-2 border-b pb-2">Pilih Nominal Token :</h3>
                <div class="grid grid-cols-2 gap-3 pb-4">
                    
                    <button class="bolt-card bg-white p-4 rounded-[20px] flex items-center gap-3 cursor-pointer text-left">
                        <div class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 flex-shrink-0"><i class="fa fa-bolt bolt-icon"></i></div>
                        <div>
                            <p class="text-[12px] font-black text-slate-700">Rp 20.000</p>
                            <p class="text-[7px] font-bold text-slate-400 mt-1 uppercase">Harga: Rp 22.000</p>
                        </div>
                    </button>

                    <button class="bolt-card bg-white p-4 rounded-[20px] flex items-center gap-3 cursor-pointer text-left">
                        <div class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 flex-shrink-0"><i class="fa fa-bolt bolt-icon"></i></div>
                        <div>
                            <p class="text-[12px] font-black text-slate-700">Rp 50.000</p>
                            <p class="text-[7px] font-bold text-slate-400 mt-1 uppercase">Harga: Rp 52.000</p>
                        </div>
                    </button>

                    <button class="bolt-card bg-white p-4 rounded-[20px] flex items-center gap-3 cursor-pointer text-left">
                        <div class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 flex-shrink-0"><i class="fa fa-bolt bolt-icon"></i></div>
                        <div>
                            <p class="text-[12px] font-black text-slate-700">Rp 100.000</p>
                            <p class="text-[7px] font-bold text-slate-400 mt-1 uppercase">Harga: Rp 102.000</p>
                        </div>
                    </button>

                    <button class="bolt-card bg-white p-4 rounded-[20px] flex items-center gap-3 cursor-pointer text-left">
                        <div class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 flex-shrink-0"><i class="fa fa-bolt bolt-icon"></i></div>
                        <div>
                            <p class="text-[12px] font-black text-slate-700">Rp 200.000</p>
                            <p class="text-[7px] font-bold text-slate-400 mt-1 uppercase">Harga: Rp 202.000</p>
                        </div>
                    </button>

                    <button class="bolt-card bg-white p-4 rounded-[20px] flex items-center gap-3 cursor-pointer text-left">
                        <div class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 flex-shrink-0"><i class="fa fa-bolt bolt-icon"></i></div>
                        <div>
                            <p class="text-[12px] font-black text-slate-700">Rp 500.000</p>
                            <p class="text-[7px] font-bold text-slate-400 mt-1 uppercase">Harga: Rp 502.000</p>
                        </div>
                    </button>

                    <button class="bolt-card bg-white p-4 rounded-[20px] flex items-center gap-3 cursor-pointer text-left">
                        <div class="w-8 h-8 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 flex-shrink-0"><i class="fa fa-bolt bolt-icon"></i></div>
                        <div>
                            <p class="text-[12px] font-black text-slate-700">Rp 1.000.000</p>
                            <p class="text-[7px] font-bold text-slate-400 mt-1 uppercase">Harga: Rp 1.002.000</p>
                        </div>
                    </button>

                </div>
            </div>

            <div id="tab-tagihan" class="tab-content space-y-5">
                
                <div class="bg-sky-50 border border-sky-100 p-4 rounded-2xl flex items-start gap-3 mb-2 transition-transform hover:scale-105">
                    <i class="fa fa-info-circle text-sky-500 mt-0.5 text-lg"></i>
                    <div>
                        <p class="text-[9px] font-black text-sky-900 uppercase">Cek Tagihan Listrik</p>
                        <p class="text-[8px] font-bold text-sky-700 mt-1 leading-relaxed">Masukkan ID Pelanggan Anda. Sistem akan memunculkan jumlah tagihan bulan ini secara otomatis.</p>
                    </div>
                </div>

                <div class="electric-input bg-white rounded-[20px] p-3 shadow-sm">
                    <label class="text-[8px] font-black text-slate-400 uppercase ml-2 block pt-1 tracking-widest">ID Pelanggan (Pascabayar)</label>
                    <div class="flex items-center px-2 pb-1 mt-1">
                        <i class="fa fa-plug text-slate-300 mr-3 text-lg"></i>
                        <input type="number" id="id-tagihan" placeholder="51xxxxxxxxxx" class="w-full bg-transparent py-2 text-sm font-black text-slate-700 outline-none tracking-widest">
                    </div>
                </div>
            </div>

        </div>

        <div class="p-6 bg-white border-t rounded-t-[30px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <button onclick="prosesPLN()" class="w-full py-5 bg-pln-grad text-white rounded-[20px] text-[12px] font-black uppercase italic tracking-widest btn-active shadow-xl shadow-sky-200">
                <span id="btn-text-main">LANJUT PEMBAYARAN</span> <i class="fa fa-arrow-right ml-2"></i>
            </button>
        </div>

    </div>

    <script>
        let currentMode = 'token'; // Mode default

        // Fungsi Ganti Tab
        function switchTab(mode) {
            currentMode = mode;
            
            const btnToken = document.getElementById('btn-token');
            const btnTagihan = document.getElementById('btn-tagihan');
            const tabToken = document.getElementById('tab-token');
            const tabTagihan = document.getElementById('tab-tagihan');
            const btnMainText = document.getElementById('btn-text-main');

            if (mode === 'token') {
                // Style Tombol Aktif
                btnToken.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-white bg-sky-600 shadow-md";
                btnToken.innerHTML = '<i class="fa fa-bolt mr-1 text-yellow-300"></i> Token (Prabayar)';
                
                // Style Tombol Tidak Aktif
                btnTagihan.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-slate-500 hover:text-sky-600";
                
                // Ganti Konten
                tabToken.classList.add('active');
                tabTagihan.classList.remove('active');
                
                // Ubah Teks Tombol Bawah
                btnMainText.innerText = "LANJUT PEMBELIAN";
            } else {
                // Style Tombol Aktif
                btnTagihan.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-white bg-sky-600 shadow-md";
                
                // Style Tombol Tidak Aktif
                btnToken.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-tighter rounded-xl transition-all z-10 text-slate-500 hover:text-sky-600";
                btnToken.innerHTML = '<i class="fa fa-bolt mr-1"></i> Token (Prabayar)';
                
                // Ganti Konten
                tabTagihan.classList.add('active');
                tabToken.classList.remove('active');
                
                // Ubah Teks Tombol Bawah
                btnMainText.innerText = "CEK TAGIHAN PLN";
            }
        }

        // Fungsi Eksekusi Pembayaran
        function prosesPLN() {
            if (currentMode === 'token') {
                const idToken = document.getElementById('id-token').value;
                if (!idToken) {
                    alert("Waduh Pak, tolong masukkan Nomor Meter/ID Pelanggan dulu ya.");
                    return;
                }
                alert(`Memproses pembelian Token Listrik untuk ID: ${idToken}\n(Silakan pilih nominal di atas)`);
            } else {
                const idTagihan = document.getElementById('id-tagihan').value;
                if (!idTagihan) {
                    alert("Pak, ID Pelanggan Pascabayarnya jangan sampai kosong.");
                    return;
                }
                
                // Simulasi Loading
                const btn = document.querySelector('.bg-pln-grad');
                const originalText = btn.innerHTML;
                btn.innerHTML = `<span class="relative z-10"><i class="fa fa-spinner fa-spin"></i> MENGECEK SERVER PLN...</span>`;
                
                setTimeout(() => {
                    alert(`✅ Data Ditemukan!\n\nID Pelanggan: ${idTagihan}\nNama: Bpk. Jajang\nTagihan Bulan Ini: Rp 145.000\n\n(Ini adalah simulasi cek tagihan Pascabayar)`);
                    btn.innerHTML = originalText;
                }, 1500);
            }
        }
    </script>
</body>
</html>
