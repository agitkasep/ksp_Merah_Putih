<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - KSP Merah Putih</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { background:#f1f5f9; font-family:sans-serif; }
.container { max-width:480px; margin:auto; background:white; min-height:100vh; padding:20px; }

.camera-box {
    width:100%;
    height:250px;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    position:relative;
}

video { width:100%; height:100%; object-fit:cover; }

.preview {
    width:100%;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container space-y-5">

<h1 class="text-xl font-bold text-center">Daftar Anggota</h1>

<!-- FORM -->
<input type="text" id="nama" placeholder="Nama lengkap" class="w-full p-3 border rounded-xl">
<input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded-xl">

<!-- PASSWORD -->
<div class="relative">
    <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-xl pr-12">
    <div id="togglePass" class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer">
        <i class="fas fa-eye"></i>
    </div>
</div>

<!-- FOTO KTP -->
<div>
    <p class="font-bold">Foto KTP</p>
    <div class="camera-box">
        <video id="videoKTP" autoplay></video>
    </div>
    <button onclick="capture('ktp')" class="w-full mt-2 bg-blue-500 text-white p-2 rounded-xl">Ambil Foto KTP</button>
    <img id="previewKTP" class="preview hidden">
</div>

<!-- FOTO WAJAH -->
<div>
    <p class="font-bold">Foto Wajah</p>
    <div class="camera-box">
        <video id="videoFace" autoplay></video>
    </div>
    <button onclick="capture('face')" class="w-full mt-2 bg-green-500 text-white p-2 rounded-xl">Ambil Foto Wajah</button>
    <img id="previewFace" class="preview hidden">
</div>

<button onclick="submitData()" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">
Daftar
</button>

</div>

<script>
let streamKTP, streamFace;

// START CAMERA
async function startCamera() {
    streamKTP = await navigator.mediaDevices.getUserMedia({ video:true });
    document.getElementById('videoKTP').srcObject = streamKTP;

    streamFace = await navigator.mediaDevices.getUserMedia({ video:true });
    document.getElementById('videoFace').srcObject = streamFace;
}

startCamera();

// CAPTURE FOTO
function capture(type) {
    const video = document.getElementById(type === 'ktp' ? 'videoKTP' : 'videoFace');
    const canvas = document.createElement('canvas');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    const imgData = canvas.toDataURL('image/png');

    if(type === 'ktp') {
        const preview = document.getElementById('previewKTP');
        preview.src = imgData;
        preview.classList.remove('hidden');
    } else {
        const preview = document.getElementById('previewFace');
        preview.src = imgData;
        preview.classList.remove('hidden');
    }
}

// PASSWORD TOGGLE
document.getElementById('togglePass').addEventListener('click', () => {
    const input = document.getElementById('password');
    const icon = document.querySelector('#togglePass i');

    if(input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye','fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash','fa-eye');
    }
});

// SUBMIT
function submitData() {
    const nama = document.getElementById('nama').value;
    const email = document.getElementById('email').value;

    const ktp = document.getElementById('previewKTP').src;
    const face = document.getElementById('previewFace').src;

    if(!ktp || !face) {
        alert("Foto belum lengkap!");
        return;
    }

    console.log({nama, email, ktp, face});

    alert("Data berhasil dikirim (dummy)");
}
</script>

</body>
</html>
