<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Anggota</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="login-area" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border-t-8 border-blue-600 text-center">
            <h1 class="text-2xl font-black mb-6 uppercase">LOGIN ANGGOTA</h1>
            <div class="space-y-4">
                <input type="text" id="phone" placeholder="Nomor HP" class="w-full p-3 border rounded-xl outline-none">
                <input type="password" id="pin" placeholder="PIN 6 Digit" class="w-full p-3 border rounded-xl text-center outline-none">
                <button onclick="login()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold">MASUK</button>
            </div>
        </div>
    </div>
    <div id="dash-area" class="hidden">
        <div class="bg-blue-600 p-8 text-white text-center rounded-b-[3rem] shadow-xl">
            <h2 id="u-nama" class="text-2xl font-bold italic">...</h2>
            <div class="mt-6 bg-white/20 p-5 rounded-3xl">
                <p class="text-xs uppercase font-bold opacity-80">Saldo Anda</p>
                <h3 id="u-saldo" class="text-4xl font-black">Rp 0</h3>
            </div>
        </div>
    </div>
    <script>
        async function login() {
            const p = document.getElementById('phone').value;
            const i = document.getElementById('pin').value;
            const { data } = await supabaseClient.from('profiles').select('*').eq('phone', p).eq('pin', i).single();
            if (data) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('dash-area').classList.remove('hidden');
                document.getElementById('u-nama').innerText = data.nama_lengkap;
                render(data.balance);
                supabaseClient.channel('real').on('postgres_changes', { event:'UPDATE', schema:'public', table:'profiles', filter:`id=eq.${data.id}` }, 
                payload => render(payload.new.balance)).subscribe();
            } else { alert("Login Gagal! Cek HP & PIN."); }
        }
        function render(v) { document.getElementById('u-saldo').innerText = "Rp " + new Intl.NumberFormat('id-ID').format(v); }
    </script>
</body>
</html>
