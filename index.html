<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koperasi Merah Putih</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'sans-serif'; }
        .dashed-border { border: 2px dashed #cbd5e1; }
    </style>
</head>
<body class="pb-20">

    <div class="p-4 bg-white flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center border-2 border-indigo-100">
                <i class="fa fa-user text-gray-400 text-xl"></i>
            </div>
            <div>
                <p class="text-[10px] text-gray-500 italic">Hallo nasabah...</p>
                <h1 class="font-bold text-gray-800 text-sm tracking-tight">"KOPERASI MERAH PUTIH"</h1>
                <div class="flex items-center gap-1 mt-0.5 text-indigo-600">
                    <i class="fa fa-location-dot text-[10px]"></i>
                    <p id="user-location" class="text-[9px] font-bold uppercase">Mendeteksi Lokasi...</p>
                </div>
            </div>
        </div>
        <div class="flex gap-4 text-gray-400">
            <div class="text-right mr-2">
                <p id="current-day" class="text-[10px] font-bold text-gray-600 leading-none"></p>
                <p id="current-time" class="text-[10px] text-indigo-600 font-mono font-bold"></p>
            </div>
            <i class="fa fa-bell text-xl mt-1"></i>
            <i class="fa fa-qrcode text-xl mt-1"></i>
        </div>
    </div>

    <div class="m-4 p-6 bg-white rounded-2xl dashed-border text-center shadow-sm">
        <p class="text-gray-600 text-sm mb-5 leading-relaxed font-medium">
            "Untuk menggunakan seluruh layanan kami silahkan Anda login atau daftar data terlebih dahulu"
        </p>
        <div class="flex gap-4 justify-center">
            <button onclick="window.location.href='login.html'" class="w-32 py-2.5 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition">LOGIN</button>
            <button onclick="window.location.href='daftar.html'" class="w-32 py-2.5 border-2 border-indigo-600 text-indigo-600 rounded-xl font-bold active:scale-95 transition">DAFTAR</button>
        </div>
    </div>

    <div class="grid grid-cols-4 gap-4 px-5 mt-8">
        <div class="text-center group">
            <div class="aspect-square bg-indigo-50 rounded-2xl flex items-center justify-center mb-2 shadow-sm group-active:bg-indigo-200">
                <i class="fa fa-wallet text-indigo-600 text-2xl"></i>
            </div>
            <p class="text-[10px] font-bold text-gray-600">SIMPANAN</p>
        </div>
        <div class="text-center group">
            <div class="aspect-square bg-green-50 rounded-2xl flex items-center justify-center mb-2 shadow-sm group-active:bg-green-200">
                <i class="fa fa-hand-holding-dollar text-green-600 text-2xl"></i>
            </div>
            <p class="text-[10px] font-bold text-gray-600">PINJAMAN</p>
        </div>
        <div class="text-center group">
            <div class="aspect-square bg-orange-50 rounded-2xl flex items-center justify-center mb-2 shadow-sm group-active:bg-orange-200">
                <i class="fa fa-store text-orange-600 text-2xl"></i>
            </div>
            <p class="text-[10px] font-bold text-gray-600">TOKO</p>
        </div>
        <div class="text-center group">
            <div class="aspect-square bg-blue-50 rounded-2xl flex items-center justify-center mb-2 shadow-sm group-active:bg-blue-200">
                <i class="fa fa-info-circle text-blue-600 text-2xl"></i>
            </div>
            <p class="text-[10px] font-bold text-gray-600">INFO KSP</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around py-3 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <div class="text-center text-indigo-600">
            <i class="fa fa-home text-xl"></i>
            <p class="text-[10px] font-bold uppercase">Home</p>
        </div>
        <div class="text-center text-gray-300 hover:text-indigo-400 cursor-pointer">
            <i class="fa fa-user-circle text-xl"></i>
            <p class="text-[10px] font-bold uppercase">Akun</p>
        </div>
    </div>

    <script>
        // 1. Fungsi Update Jam & Hari
        function updateTime() {
            const now = new Date();
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            
            const dayName = days[now.getDay()];
            const date = now.getDate();
            const monthName = months[now.getMonth()];
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('current-day').innerText = `${dayName}, ${date} ${monthName}`;
            document.getElementById('current-time').innerText = `${hours}:${minutes}:${seconds} WIB`;
        }

        // 2. Fungsi Ambil Lokasi Kota (IP-Based Geolocation)
        async function getLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if(data.city) {
                    document.getElementById('user-location').innerText = `${data.city}, ${data.region}`;
                } else {
                    document.getElementById('user-location').innerText = "Lokasi tidak terdeteksi";
                }
            } catch (error) {
                document.getElementById('user-location').innerText = "Jakarta, ID";
            }
        }

        // Jalankan Fungsi
        setInterval(updateTime, 1000);
        updateTime();
        getLocation();
    </script>
</body>
</html>
