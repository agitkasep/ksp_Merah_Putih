<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOPDESKEL Merah Putih</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        body { background-color: #cbd5e1; margin: 0; display: flex; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .app-container { width: 100%; max-width: 480px; height: 100vh; background-color: #f8fafc; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.3); }
        .main-content { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .marquee-container { background: #f0f4ff; color: #3730a3; padding: 7px 0; overflow: hidden; white-space: nowrap; font-size: 10px; font-weight: 800; border-bottom: 1px solid #e0e7ff; flex-shrink: 0; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .footer-nav { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding-top: 15px; padding-bottom: 40px; border-radius: 35px 35px 0 0; z-index: 100; }
        .qr-center { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: linear-gradient(135deg, #4338ca, #6366f1); border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 4px solid white; box-shadow: 0 8px 20px rgba(67, 56, 202, 0.3); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="p-4 bg-white flex justify-between items-center z-50 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg border overflow-hidden">
                    <img src="logo.png" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/40'">
                </div>
                <div>
                    <h1 class="font-black text-gray-900 text-[10px] leading-tight uppercase italic">"KOPDESKEL MERAH PUTIH"</h1>
                    <p id="user-location" class="text-[8px] font-bold text-indigo-500 uppercase"><i class="fa fa-location-dot"></i> Mendeteksi Lokasi...</p>
                </div>
            </div>
            <div class="text-right">
                <p id="current-day" class="text-[7px] font-bold text-gray-400 uppercase tracking-tighter"></p>
                <p id="current-time" class="text-[10px] text-indigo-700 font-black"></p>
            </div>
        </div>

        <div class="marquee-container">
            <div class="marquee-text">Selamat Datang di KOPDESKEL Merah Putih - Layanan Simpan Pinjam Digital Terpercaya - Silahkan Login atau Daftar terlebih dahulu</div>
        </div>

        <div class="main-content">
            <div class="mx-4 my-5 p-6 bg-white rounded-[30px] border border-indigo-50 shadow-sm text-center">
                <p class="text-gray-400 text-[9px] mb-4 font-bold italic uppercase tracking-widest">Silahkan anda Login atau Daftar agar bisa menikmati layanan kami, terimakasih</p>
                <div class="flex gap-3">
                    <button onclick="openLogin()" class="flex-1 py-3.5 bg-indigo-600 text-white rounded-2xl text-[11px] font-black shadow-lg">LOGIN</button>
                    <button onclick="window.location.href='daftar.html'" class="flex-1 py-3.5 border-2 border-indigo-600 text-indigo-600 rounded-2xl text-[11px] font-black">DAFTAR</button>
                </div>
            </div>
        </div>

        <div class="footer-nav">
            <div class="text-center text-indigo-600 flex-1 cursor-pointer"><i class="fa fa-home text-2xl"></i><p class="text-[9px] font-black mt-1 uppercase">Home</p></div>
            <div class="flex-1 relative"><div onclick="openLogin()" class="qr-center cursor-pointer"><i class="fa fa-qrcode text-white text-3xl"></i></div></div>
            <div onclick="openLogin()" class="text-center text-gray-400 flex-1 cursor-pointer"><i class="fa fa-user-circle text-2xl"></i><p class="text-[9px] font-black mt-1 uppercase">Akun</p></div>
        </div>

        <div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[200] items-center justify-center p-4 hidden">
            <div class="bg-white w-full max-w-[340px] rounded-[40px] overflow-hidden shadow-2xl">
                <div class="bg-indigo-600 p-6 text-center">
                    <h2 class="text-white font-black text-xl uppercase italic tracking-wider">L O G I N</h2>
                </div>

                <div class="p-8 space-y-4">
                    <div class="bg-gray-50 border-2 rounded-2xl px-4 py-3 flex items-center">
                        <i class="fa fa-user text-gray-300 mr-3"></i>
                        <input type="text" id="login-username" placeholder="Username" class="bg-transparent w-full text-[11px] font-bold outline-none">
                    </div>

                    <div class="bg-gray-50 border-2 rounded-2xl px-4 py-3 flex items-center relative">
                        <i class="fa fa-lock text-gray-300 mr-3"></i>
                        <input type="password" id="login-password" placeholder="Password" class="bg-transparent w-full text-[11px] font-bold outline-none pr-10">
                        <div id="toggle-password" class="absolute right-4 cursor-pointer text-gray-400"><i class="fa fa-eye"></i></div>
                    </div>

                  <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
    <label class="text-[9px] font-black text-indigo-400 uppercase mb-2 block text-center">Verifikasi Keamanan</label>
    <div class="flex items-center justify-between px-4">
        <span id="captcha-question" class="text-sm font-black text-indigo-700 italic">... + ... =</span>
        <div class="relative w-20">
            <input type="number" id="captcha-answer" oninput="checkCaptcha()" placeholder="?" class="w-full p-2 bg-white border-2 border-indigo-200 rounded-xl text-center font-bold text-gray-700 outline-none focus:border-indigo-500">
            <i id="captcha-status" class="fa fa-check-circle absolute -right-6 top-3 text-green-500 hidden"></i>
        </div>
    </div>
</div>

                <div class="px-8 pb-8">
                    <button id="btn-login" onclick="validaSiLogin()" class="w-full py-4 bg-gray-300 text-white rounded-2xl text-[12px] font-black uppercase" disabled>Masuk Sekarang</button>
                    <button onclick="closeLogin()" class="w-full text-[10px] font-black text-gray-400 uppercase mt-4 text-center">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // UPDATE WAKTU
        function updateTime() {
            const now = new Date();
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            document.getElementById('current-day').innerText = `${days[now.getDay()]}, ${now.getDate()} April`;
            document.getElementById('current-time').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')} WIB`;
        }
        setInterval(updateTime, 1000); updateTime();

        // MATA PASSWORD
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passInput = document.getElementById('login-password');
            const icon = this.querySelector('i');
            if (passInput.type === 'password') {
                passInput.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // CAPTCHA
        let captchaResult = 0;
        function openLogin() {
            document.getElementById('loginModal').style.display = 'flex';
            const n1 = Math.floor(Math.random() * 9) + 1;
            const n2 = Math.floor(Math.random() * 9) + 1;
            captchaResult = n1 + n2;
            document.getElementById('captcha-question').innerText = `${n1} + ${n2} =`;
            document.getElementById('captcha-answer').value = '';
            checkCaptcha();
        }
        function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }
        document.getElementById('captcha-answer').addEventListener('input', checkCaptcha);
      function checkCaptcha() {
    const inputVal = document.getElementById('captcha-answer').value;
    const ans = parseInt(inputVal);
    const btn = document.getElementById('btn-login');
    const icon = document.getElementById('captcha-status');

    if (ans === captchaResult) {
        // Jika jawaban benar: Munculkan centang dan ubah tombol jadi biru
        if(icon) icon.classList.remove('hidden');
        btn.disabled = false;
        btn.classList.remove('bg-gray-300', 'cursor-not-allowed');
        btn.classList.add('bg-indigo-600', 'shadow-lg');
    } else {
        // Jika jawaban salah/kosong: Sembunyikan centang dan matikan tombol
        if(icon) icon.classList.add('hidden');
        btn.disabled = true;
        btn.classList.remove('bg-indigo-600', 'shadow-lg');
        btn.classList.add('bg-gray-300', 'cursor-not-allowed');
    }
}

        // ==========================================
        // FUNGSI LOGIN DENGAN DEBUGGING SUPER LENGKAP
        // ==========================================
      // ==========================================
// FUNGSI LOGIN YANG SUDAH DIPERBAIKI
// ==========================================
async function validaSiLogin() {
    const user = document.getElementById('login-username').value.trim();
    const pass = document.getElementById('login-password').value.trim();
    const btn = document.getElementById('btn-login');

    if (!user || !pass) {
        alert("Silahkan isi Username dan Password!");
        return;
    }

    btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> MEMPROSES...';
    btn.disabled = true;

    try {
        // PENTING: Cek apakah config.js sudah dimuat dengan benar
        if (typeof supabaseClient === 'undefined') {
            throw new Error("File config.js belum terbaca atau variabel 'supabaseClient' tidak ditemukan.");
        }

        // PENTING: Menggunakan 'supabaseClient', BUKAN 'supabase'
        const { data, error } = await supabaseClient
            .from('berkas_anggota')
            .select('*')
            .eq('username', user)
            .eq('password', pass)
            .single();

        if (error) {
            console.error("Detail Error Supabase:", error);
            alert("LOGIN GAGAL: Username atau Password salah.");
            generateCaptcha(); // Reset captcha
            btn.innerHTML = 'Masuk Sekarang';
        } else if (!data) {
            alert("Username atau Password tidak terdaftar!");
            generateCaptcha();
            btn.innerHTML = 'Masuk Sekarang';
        } else {
            // JIKA SUKSES
            localStorage.setItem("user_login", JSON.stringify({
                username: user, 
                nama: data.nama_lengkap, 
                isLoggedIn: true
            }));
            alert(`✅ Login Sukses!\nSelamat datang, ${data.nama_lengkap}!`);
            window.location.href = "anggota.html";
        }
    } catch (err) {
        console.error("Error Sistem:", err);
        alert("KESALAHAN SISTEM:\n" + err.message);
        btn.innerHTML = 'Masuk Sekarang';
    }
}
    </script>
</body>
</html>
