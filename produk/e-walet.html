<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>E-Wallet KOPDESKEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; display: flex; justify-content: center; min-height: 100vh; font-family: sans-serif; margin: 0; }
        .app-container { width: 100%; max-width: 480px; background-color: #ffffff; position: relative; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.1); overflow-x: hidden; }
        
        /* EFEK MAGNETIC & GLOW */
        .wallet-item { 
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 2px solid #f1f5f9;
            background: white;
            cursor: pointer;
        }
        .wallet-item:hover { transform: translateY(-5px); border-color: #4338ca; box-shadow: 0 10px 20px rgba(67, 56, 202, 0.15); }
        .wallet-item.active { border-color: #4338ca; background-color: #eef2ff; }

        .nom-btn { border: 1.5px solid #e2e8f0; transition: all 0.2s; font-style: italic; }
        .nom-btn.selected { background-color: #4338ca; color: white; border-color: #4338ca; box-shadow: 0 8px 20px rgba(67, 56, 202, 0.3); }

        .header-bg { background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%); }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-bg p-5 flex items-center text-white sticky top-0 z-50 rounded-b-[25px] shadow-lg">
            <i onclick="window.history.back()" class="fa fa-arrow-left text-lg cursor-pointer p-2 btn-active"></i>
            <h1 class="flex-1 text-center font-black italic uppercase tracking-widest text-[11px] mr-8">Top Up E-Wallet</h1>
        </div>

        <div class="flex-1 p-6 overflow-y-auto pb-32">
            <div class="mb-8">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">ID Akun / No HP Tujuan</label>
                <div class="relative">
                    <i class="fa fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="number" id="id-tujuan" placeholder="08xx xxxx xxxx" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 pl-12 pr-4 text-sm font-black text-slate-700 outline-none focus:border-indigo-500 transition-all">
                </div>
            </div>

            <h3 class="text-[10px] font-black text-indigo-900 uppercase italic mb-4">Pilih Dompet Digital :</h3>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                
                <div onclick="setWallet(this, 'DANA')" class="wallet-item p-4 rounded-[25px] flex flex-col items-center gap-2">
                    <svg width="60" height="30" viewBox="0 0 100 40">
                        <rect width="100" height="40" rx="10" fill="#108EE9"/>
                        <text x="50" y="26" font-family="Arial" font-weight="900" font-size="16" fill="white" text-anchor="middle" font-style="italic">DANA</text>
                    </svg>
                    <span class="text-[9px] font-black uppercase text-slate-500">DANA</span>
                </div>

                <div onclick="setWallet(this, 'OVO')" class="wallet-item p-4 rounded-[25px] flex flex-col items-center gap-2">
                    <svg width="60" height="30" viewBox="0 0 100 40">
                        <rect width="100" height="40" rx="10" fill="#4C2B90"/>
                        <text x="50" y="26" font-family="Arial" font-weight="900" font-size="16" fill="white" text-anchor="middle" font-style="italic">OVO</text>
                    </svg>
                    <span class="text-[9px] font-black uppercase text-slate-500">OVO</span>
                </div>

                <div onclick="setWallet(this, 'GOPAY')" class="wallet-item p-4 rounded-[25px] flex flex-col items-center gap-2">
                    <svg width="60" height="30" viewBox="0 0 100 40">
                        <rect width="100" height="40" rx="10" fill="#00AA13"/>
                        <text x="50" y="26" font-family="Arial" font-weight="900" font-size="14" fill="white" text-anchor="middle" font-style="italic">GOPAY</text>
                    </svg>
                    <span class="text-[9px] font-black uppercase text-slate-500">GOPAY</span>
                </div>

                <div onclick="setWallet(this, 'SHOPEEPAY')" class="wallet-item p-4 rounded-[25px] flex flex-col items-center gap-2">
                    <svg width="60" height="30" viewBox="0 0 100 40">
                        <rect width="100" height="40" rx="10" fill="#EE4D2D"/>
                        <text x="50" y="26" font-family="Arial" font-weight="900" font-size="12" fill="white" text-anchor="middle" font-style="italic">SHOPEE</text>
                    </svg>
                    <span class="text-[9px] font-black uppercase text-slate-500">SHOPEEPAY</span>
                </div>

            </div>

            <div id="nom-area" class="hidden">
                <h3 id="label-nom" class="text-[10px] font-black text-indigo-900 uppercase italic mb-4">Pilih Nominal :</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setNominal(this, 10000)" class="nom-btn p-4 rounded-2xl text-xs font-black text-slate-700">Rp 10.000</button>
                    <button onclick="setNominal(this, 20000)" class="nom-btn p-4 rounded-2xl text-xs font-black text-slate-700">Rp 20.000</button>
                    <button onclick="setNominal(this, 50000)" class="nom-btn p-4 rounded-2xl text-xs font-black text-slate-700">Rp 50.000</button>
                    <button onclick="setNominal(this, 100000)" class="nom-btn p-4 rounded-2xl text-xs font-black text-slate-700">Rp 100.000</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 w-full max-w-[480px] bg-white border-t p-5 rounded-t-[35px] shadow-[0_-10px_30px_rgba(0,0,0,0.08)]">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Bayar</span>
                <span id="total-txt" class="text-base font-black text-indigo-700 italic">Rp 0</span>
            </div>
            <button onclick="prosesEw()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl text-[12px] font-black uppercase italic tracking-widest shadow-xl btn-active">
                Konfirmasi Top Up <i class="fa fa-arrow-right ml-2"></i>
            </button>
        </div>
    </div>

    <script>
        let wName = "";
        let nVal = 0;

        function setWallet(el, name) {
            document.querySelectorAll('.wallet-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            wName = name;
            document.getElementById('nom-area').classList.remove('hidden');
            document.getElementById('label-nom').innerText = `Nominal ${name} :`;
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function setNominal(el, price) {
            document.querySelectorAll('.nom-btn').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            nVal = price;
            let total = price + 1500; // Admin Rp 1.500
            document.getElementById('total-txt').innerText = 'Rp ' + total.toLocaleString('id-ID');
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function prosesEw() {
            const id = document.getElementById('id-tujuan').value;
            if(!wName || !id || nVal === 0) {
                alert("Waduh Pak, tolong isi nomor HP dan pilih nominalnya dulu!");
                return;
            }
            alert(`Siap Pak Agit! Top Up ${wName} ke nomor ${id} sedang diproses.`);
        }
    </script>
</body>
</html>
