<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>Kolektor Lapangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-md mx-auto space-y-6">
        <h1 class="text-2xl font-black text-yellow-500 italic uppercase">INPUT SETORAN</h1>
        <div class="bg-gray-800 p-6 rounded-3xl space-y-4 border-b-4 border-yellow-500">
            <select id="users" class="w-full p-4 bg-gray-700 rounded-2xl outline-none text-white font-bold"></select>
            <input type="number" id="amt" placeholder="Jumlah Setoran (Rp)" class="w-full p-4 bg-gray-700 rounded-2xl outline-none text-yellow-400 font-bold text-xl">
            <button onclick="update()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-2xl shadow-lg uppercase">TAMBAH SALDO</button>
        </div>
    </div>
    <script>
        async function load() {
            const { data } = await supabaseClient.from('profiles').select('*');
            const s = document.getElementById('users');
            data.forEach(n => {
                let o = document.createElement('option');
                o.value = n.id; o.dataset.bal = n.balance; o.text = n.nama_lengkap;
                s.add(o);
            });
        }
        async function update() {
            const id = document.getElementById('users').value;
            const add = parseInt(document.getElementById('amt').value);
            const old = parseInt(document.getElementById('users').selectedOptions[0].dataset.bal);
            if(!id || !add) return alert("Pilih orang & isi nominal!");
            const { error } = await supabaseClient.from('profiles').update({ balance: old + add }).eq('id', id);
            if (!error) { alert("Saldo Berhasil Ditambah!"); location.reload(); }
        }
        load();
    </script>
</body>
</html>
