<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOPDESKEL Merah Putih</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #cbd5e1; margin: 0; display: flex; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        .app-container { 
            width: 100%; 
            max-width: 480px; 
            height: 100vh; 
            background-color: #f8fafc; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 40px rgba(0,0,0,0.2); 
        }

        /* Efek Tombol Mewah */
        .btn-active-effect:active { transform: scale(0.90); opacity: 0.8; transition: all 0.1s ease-out; }

        /* AREA UTAMA: Bisa Scroll di PC & HP */
        .main-content { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding-bottom: 180px; /* Jarak sangat besar agar footer tidak menabrak tombol HP */
        }
        .main-content::-webkit-scrollbar { width: 0px; }

        /* SCROLL PRODUK HORIZONTAL (PC & HP FIX) */
        .promo-wrapper {
            width: 100%;
            overflow-x: auto;
            display: flex;
            gap: 12px;
            padding: 10px 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        /* Agar di PC scrollbar terlihat tipis atau bersih */
        .promo-wrapper::-webkit-scrollbar { height: 4px; }
        .promo-wrapper::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .promo-item {
            flex: 0 0 160px;
            scroll-snap-align: start;
            background: white;
            border-radius: 20px;
            padding: 10px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .img-container { width: 100%; height: 100px; background-color: #f8fafc; overflow: hidden; border-radius: 14px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .promo-item:hover img { transform: scale(1.1); }

        /* FOOTER: Dibuat lebih tinggi lagi untuk Safe Area HP */
        .footer-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-around;
            items-start;
            padding-top: 16px;
            padding-bottom: 45px; /* NAIK LAGI: Ruang untuk tombol navigasi HP */
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .qr-button-container {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 110;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="p-4 bg-white flex justify-between items-center z-50 border-b border-gray-50">
            <div class="flex items-center gap-3">
                <div class="w-14 h-14 rounded-xl flex items-center justify-center border-2 border-gray-100 bg-white overflow-hidden p-0.5 shadow-inner">
                    <img src="logo.png" alt="Logo" class="w-full h-full object-cover rounded-lg">
                </div>
                <div>
                    <h1 class="font-black text-gray-900 text-[12px] leading-tight uppercase tracking-tighter">"KOPDESKEL<br>MERAH PUTIH"</h1>
                    <p class="text-[8px] font-black text-indigo-500 uppercase">Pondok Bambu, Jakarta</p>
                </div>
            </div>
            <div class="text-right">
                <p id="current-day" class="text-[8px] font-bold text-gray-400"></p>
                <p id="current-time" class="text-[11px] text-indigo-700 font-black"></p>
            </div>
        </div>

        <div class="main-content">
            <div class="mx-4 my-5 p-5 bg-gradient-to-br from-white to-indigo-50/30 rounded-3xl border-2 border-dashed border-indigo-100 text-center">
                <p class="text-gray-500 text-[11px] mb-4 font-bold italic leading-tight">"Silahkan Login/Daftar untuk akses penuh"</p>
                <div class="flex gap-3">
                    <button class="flex-1 py-3 bg-indigo-600 text-white rounded-2xl text-[10px] font-black shadow-lg shadow-indigo-200 btn-active-effect">LOGIN</button>
                    <button class="flex-1 py-3 border-2 border-indigo-600 text-indigo-600 rounded-2xl text-[10px] font-black btn-active-effect">DAFTAR</button>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-4 px-4 mb-8">
                <div class="text-center btn-active-effect cursor-pointer">
                    <div class="aspect-square bg-white rounded-2xl flex items-center justify-center mb-1 shadow-sm border border-gray-100">
                        <i class="fa fa-wallet text-indigo-600 text-2xl"></i>
                    </div>
                    <p class="text-[8px] font-black text-gray-500 uppercase">Simpanan</p>
                </div>
                <div class="text-center btn-active-effect cursor-pointer">
                    <div class="aspect-square bg-white rounded-2xl flex items-center justify-center mb-1 shadow-sm border border-gray-100">
                        <i class="fa fa-hand-holding-dollar text-green-500 text-2xl"></i>
                    </div>
                    <p class="text-[8px] font-black text-gray-500 uppercase">Pinjaman</p>
                </div>
                <div class="text-center btn-active-effect cursor-pointer">
                    <div class="aspect-square bg-white rounded-2xl flex items-center justify-center mb-1 shadow-sm border border-gray-100">
                        <i class="fa fa-store text-orange-500 text-2xl"></i>
                    </div>
                    <p class="text-[8px] font-black text-gray-500 uppercase">Toko</p>
                </div>
                <div class="text-center btn-active-effect cursor-pointer">
                    <div class="aspect-square bg-white rounded-2xl flex items-center justify-center mb-1 shadow-sm border border-gray-100">
                        <i class="fa fa-info-circle text-blue-500 text-2xl"></i>
                    </div>
                    <p class="text-[8px] font-black text-gray-500 uppercase">Info KSP</p>
                </div>
            </div>

            <div class="px-4 mb-2 flex justify-between items-center">
                <h2 class="text-[12px] font-black text-gray-800 uppercase italic">Produk Promo 🔥</h2>
                <button class="text-[9px] text-indigo-600 font-black uppercase border-b-2 border-indigo-200 btn-active-effect">SEMUA</button>
            </div>

            <div class="promo-wrapper">
                <div class="promo-item btn-active-effect">
                    <div class="img-container"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300"></div>
                    <p class="text-[10px] font-black text-gray-700 mt-2 uppercase">Smart Watch</p>
                    <p class="text-[12px] font-black text-indigo-600">Rp 150rb</p>
                </div>
                <div class="promo-item btn-active-effect">
                    <div class="img-container"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300"></div>
                    <p class="text-[10px] font-black text-gray-700 mt-2 uppercase">Headset Bass</p>
                    <p class="text-[12px] font-black text-indigo-600">Rp 85rb</p>
                </div>
                <div class="promo-item btn-active-effect">
                    <div class="img-container"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300"></div>
                    <p class="text-[10px] font-black text-gray-700 mt-2 uppercase">Sport Shoes</p>
                    <p class="text-[12px] font-black text-indigo-600">Rp 210rb</p>
                </div>
                <div class="promo-item btn-active-effect">
                    <div class="img-container"><img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=300"></div>
                    <p class="text-[10px] font-black text-gray-700 mt-2 uppercase">Sunglasses</p>
                    <p class="text-[12px] font-black text-indigo-600">Rp 45rb</p>
                </div>
                <div class="promo-item btn-active-effect">
                    <div class="img-container"><img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=300"></div>
                    <p class="text-[10px] font-black text-gray-700 mt-2 uppercase">Polaroid</p>
                    <p class="text-[12px] font-black text-indigo-600">Rp 450rb</p>
                </div>
                <div class="promo-item btn-active-effect">
                    <div class="img-container"><img src="https://images.unsplash.com/photo-1585333120167-05273ca19885?w=300"></div>
                    <p class="text-[10px] font-black text-gray-700 mt-2 uppercase">Wireless Mouse</p>
                    <p class="text-[12px] font-black text-indigo-600">Rp 120rb</p>
                </div>
            </div>
        </div>

        <div class="footer-nav">
            <div class="text-center text-indigo-600 flex-1 btn-active-effect cursor-pointer">
                <i class="fa fa-home text-2xl"></i>
                <p class="text-[9px] font-black uppercase mt-1">HOME</p>
            </div>
            
            <div class="flex-1 relative">
                <div class="qr-button-container">
                    <div onclick="alert('Silahkan Login')" class="w-16 h-16 bg-gradient-to-tr from-indigo-700 to-indigo-500 rounded-full flex items-center justify-center shadow-2xl border-4 border-white active:scale-75 transition duration-200 cursor-pointer">
                        <i class="fa fa-qrcode text-white text-3xl"></i>
                    </div>
                </div>
            </div>

            <div class="text-center text-gray-400 flex-1 btn-active-effect cursor-pointer">
                <i class="fa fa-user-astronaut text-2xl text-gray-600"></i>
                <p class="text-[9px] font-black uppercase mt-1 text-gray-600">AKUN</p>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            document.getElementById('current-day').innerText = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
            document.getElementById('current-time').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} WIB`;
        }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
