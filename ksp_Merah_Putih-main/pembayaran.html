<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Pembayaran - KOPDESKEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <div class="p-6 bg-indigo-950 text-white flex items-center gap-4 shadow-xl rounded-b-[40px]">
        <i onclick="window.history.back()" class="fa fa-arrow-left text-xl cursor-pointer"></i>
        <div>
            <h1 class="font-black italic uppercase text-sm tracking-widest">Konfirmasi Bayar</h1>
            <p class="text-[8px] font-bold opacity-60 uppercase tracking-tighter">Sistem Keamanan Terverifikasi</p>
        </div>
    </div>

    <div class="p-5 max-w-md mx-auto">
        <div class="glass-card rounded-[35px] shadow-sm border border-slate-200 p-8 mb-6 mt-2">
            <div class="flex flex-col items-center mb-8 border-b border-dashed border-slate-200 pb-6">
                <div id="icon-bg" class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl mb-4">
                    <i id="main-icon" class="fa fa-file-invoice-dollar"></i>
                </div>
                <h2 id="nama-produk" class="font-black text-slate-800 uppercase italic text-lg">Produk Layanan</h2>
                <p id="detail-tujuan" class="text-[10px] font-bold text-slate-400 bg-slate-50 px-4 py-1 rounded-full mt-2 tracking-widest">ID: -</p>
            </div>

            <div class="mb-6">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-3 text-center">Jumlah Pembayaran :</label>
                <div class="relative group">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 font-black text-indigo-900 text-lg">Rp</span>
                    <input type="number" id="input-nominal" placeholder="0" 
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-[25px] py-5 pl-16 pr-6 text-2xl font-black text-indigo-950 outline-none focus:border-indigo-600 focus:bg-white transition-all">
                </div>
            </div>

            <div class="bg-emerald-50 rounded-2xl p-4 flex justify-between items-center border border-emerald-100">
                <span class="text-[9px] font-black text-emerald-800 uppercase tracking-widest">Saldo Anda:</span>
                <span class="text-sm font-black text-emerald-600 italic">Rp 2.450.000</span>
            </div>
        </div>

        <button onclick="bukaModalKeamanan()" class="w-full bg-indigo-950 text-white py-6 rounded-[30px] font-black italic shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3 tracking-widest">
            <i class="fa fa-shield-check text-xl"></i>
            KONFIRMASI SEKARANG
        </button>
    </div>

    <div id="modal-keamanan" class="fixed inset-0 bg-indigo-950/95 backdrop-blur-md z-[1000] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-[40px] p-10 text-center shadow-2xl scale-up-center">
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <i class="fa fa-user-check text-3xl"></i>
            </div>
            <h3 class="font-black italic text-slate-800 uppercase text-sm mb-2 tracking-tighter">Konfirmasi Keamanan</h3>
            <p class="text-[9px] font-bold text-slate-400 uppercase mb-8 leading-relaxed">Masukkan Nama Lengkap Anda <br>Untuk Melanjutkan Transaksi</p>
            
            <input type="text" id="input-nama-verifikasi" 
                class="w-full bg-slate-100 border-2 border-slate-200 rounded-2xl py-4 px-4 text-center text-lg font-black text-indigo-950 outline-none focus:border-indigo-600 mb-8 uppercase placeholder:text-slate-300 transition-all" 
                placeholder="CONTOH: AGIT">

            <div class="grid grid-cols-2 gap-4">
                <button onclick="tutupModalKeamanan()" class="py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">Batal</button>
                <button onclick="eksekusiBayar()" class="bg-indigo-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-200 active:scale-90 transition-all">Konfirmasi</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Ambil Data URL
        const params = new URLSearchParams(window.location.search);
        const produk = params.get('produk') || 'Transaksi';
        const id = params.get('id') || 'KOP-8892';
        const nominalDefault = params.get('harga') || '';

        document.getElementById('nama-produk').innerText = produk;
        document.getElementById('detail-tujuan').innerText = "ID: " + id;
        if(nominalDefault) document.getElementById('input-nominal').value = nominalDefault;

        // 2. Ikon & Warna Dinamis
        const iconElement = document.getElementById('main-icon');
        const iconBg = document.getElementById('icon-bg');

        if(produk.includes('PULSA')) {
            iconElement.className = 'fa fa-mobile-screen';
            iconBg.classList.add('bg-blue-100', 'text-blue-600');
        } else if(produk.includes('WASERBA')) {
            iconElement.className = 'fa fa-shop';
            iconBg.classList.add('bg-orange-100', 'text-orange-600');
        } else if(produk.includes('LISTRIK')) {
            iconElement.className = 'fa fa-bolt';
            iconBg.classList.add('bg-yellow-100', 'text-yellow-600');
        }

        // 3. Logika Modal
        function bukaModalKeamanan() {
            const nominal = document.getElementById('input-nominal').value;
            if(!nominal || nominal <= 0) {
                alert("Masukkan nominal pembayaran terlebih dahulu!");
                return;
            }
            document.getElementById('modal-keamanan').classList.remove('hidden');
            document.getElementById('input-nama-verifikasi').focus();
        }

        function tutupModalKeamanan() {
            document.getElementById('modal-keamanan').classList.add('hidden');
            document.getElementById('input-nama-verifikasi').value = "";
        }

        // 4. Logika Verifikasi Akhir
        function eksekusiBayar() {
            const nominal = document.getElementById('input-nominal').value;
            const inputNama = document.getElementById('input-nama-verifikasi').value;
            const namaBenar = "agit"; // Kunci Transaksi Bapak

            if(inputNama.toLowerCase() === namaBenar.toLowerCase()) {
                alert("✨ PEMBAYARAN BERHASIL!\n\nProduk: " + produk + "\nNominal: Rp " + parseInt(nominal).toLocaleString() + "\nStatus: Saldo Terpotong");
                window.location.href = 'anggota.html';
            } else {
                alert("❌ VERIFIKASI GAGAL!\nNama yang Anda masukkan salah.");
                document.getElementById('input-nama-verifikasi').value = "";
                document.getElementById('input-nama-verifikasi').focus();
            }
        }
    </script>
</body>
</html>
